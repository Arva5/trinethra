<!DOCTYPE html>
<html>
<head>
  <title>Trinethra Analyzer</title>
</head>
<body>
  <h2>Supervisor Feedback Analyzer</h2>

  <textarea id="input" rows="10" cols="80" placeholder="Paste transcript..."></textarea>
  <br><br>

  <button onclick="analyze()">Run Analysis</button>

  <pre id="output"></pre>

  <script>
    async function analyze() {
      const transcript = document.getElementById('input').value;

      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript })
      });

      const data = await res.json();
      document.getElementById('output').textContent =
        JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
